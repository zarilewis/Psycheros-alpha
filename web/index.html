<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBy - Strauberry Tavern</title>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-tertiary: #0f0f1a;
      --bg-card: #252542;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0b0;
      --text-dimmed: #707080;
      --accent-user: #4a9eff;
      --accent-assistant: #9b59b6;
      --accent-tool: #2ecc71;
      --accent-error: #e74c3c;
      --accent-thinking: #f39c12;
      --border-color: #3a3a5c;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background-color: var(--bg-secondary);
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      box-shadow: var(--shadow);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-assistant);
    }

    .logo span {
      color: var(--text-secondary);
      font-weight: 400;
      font-size: 1rem;
      margin-left: 0.5rem;
    }

    .header-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    /* Buttons */
    button {
      background-color: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s ease;
    }

    button:hover:not(:disabled) {
      background-color: var(--bg-secondary);
      border-color: var(--accent-assistant);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button.primary {
      background-color: var(--accent-assistant);
      border-color: var(--accent-assistant);
    }

    button.primary:hover:not(:disabled) {
      background-color: #8e44ad;
    }

    /* Main layout */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background-color: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }

    .sidebar-header {
      padding: 1rem;
      border-bottom: 1px solid var(--border-color);
    }

    .sidebar-header h3 {
      font-size: 0.875rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }

    .conversation-item {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 0.25rem;
      transition: background-color 0.2s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .conversation-item:hover {
      background-color: var(--bg-card);
    }

    .conversation-item.active {
      background-color: var(--bg-card);
      border-left: 3px solid var(--accent-assistant);
    }

    .conversation-title {
      font-size: 0.875rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .conversation-date {
      font-size: 0.75rem;
      color: var(--text-dimmed);
    }

    /* Chat area */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* Message bubbles */
    .message {
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
    }

    .message.assistant {
      align-self: flex-start;
    }

    .message-header {
      font-size: 0.75rem;
      color: var(--text-dimmed);
      margin-bottom: 0.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .message.user .message-header {
      justify-content: flex-end;
    }

    .message-content {
      padding: 0.875rem 1.25rem;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.user .message-content {
      background-color: var(--accent-user);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .message-content {
      background-color: var(--bg-card);
      border-bottom-left-radius: 4px;
    }

    /* Thinking section */
    .thinking-section {
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      margin-bottom: 0.75rem;
      overflow: hidden;
    }

    .thinking-header {
      padding: 0.5rem 0.75rem;
      background-color: rgba(243, 156, 18, 0.1);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: var(--accent-thinking);
      user-select: none;
    }

    .thinking-header:hover {
      background-color: rgba(243, 156, 18, 0.15);
    }

    .thinking-toggle {
      transition: transform 0.2s ease;
    }

    .thinking-section.collapsed .thinking-toggle {
      transform: rotate(-90deg);
    }

    .thinking-content {
      padding: 0.75rem;
      font-size: 0.875rem;
      color: var(--text-dimmed);
      line-height: 1.6;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
    }

    .thinking-section.collapsed .thinking-content {
      display: none;
    }

    /* Tool calls */
    .tool-card {
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-left: 3px solid var(--accent-tool);
      border-radius: 8px;
      margin: 0.75rem 0;
      overflow: hidden;
    }

    .tool-header {
      padding: 0.5rem 0.75rem;
      background-color: rgba(46, 204, 113, 0.1);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
    }

    .tool-icon {
      color: var(--accent-tool);
    }

    .tool-name {
      font-weight: 600;
      color: var(--accent-tool);
    }

    .tool-args {
      padding: 0.75rem;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      white-space: pre-wrap;
      word-break: break-all;
      background-color: var(--bg-primary);
      border-top: 1px solid var(--border-color);
    }

    .tool-result {
      padding: 0.75rem;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      font-size: 0.8125rem;
      background-color: var(--bg-primary);
      border-top: 1px solid var(--border-color);
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .tool-result.error {
      color: var(--accent-error);
      background-color: rgba(231, 76, 60, 0.1);
    }

    .tool-result-label {
      font-size: 0.75rem;
      color: var(--text-dimmed);
      margin-bottom: 0.25rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Status messages */
    .status-message {
      text-align: center;
      padding: 0.5rem;
      font-size: 0.8125rem;
      color: var(--text-dimmed);
      font-style: italic;
    }

    /* Input area */
    .input-area {
      padding: 1rem 1.5rem;
      background-color: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
    }

    .input-container {
      display: flex;
      gap: 0.75rem;
      max-width: 900px;
      margin: 0 auto;
    }

    #message-input {
      flex: 1;
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text-primary);
      font-size: 1rem;
      resize: none;
      min-height: 44px;
      max-height: 200px;
      font-family: inherit;
    }

    #message-input:focus {
      outline: none;
      border-color: var(--accent-assistant);
    }

    #message-input::placeholder {
      color: var(--text-dimmed);
    }

    #send-btn {
      padding: 0.75rem 1.5rem;
      background-color: var(--accent-assistant);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      min-width: 80px;
    }

    #send-btn:hover:not(:disabled) {
      background-color: #8e44ad;
    }

    /* Streaming indicator */
    .streaming-indicator {
      display: inline-flex;
      gap: 4px;
      margin-left: 0.5rem;
    }

    .streaming-indicator span {
      width: 6px;
      height: 6px;
      background-color: var(--accent-assistant);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .streaming-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .streaming-indicator span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dimmed);
      text-align: center;
      padding: 2rem;
    }

    .empty-state h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
    }

    .empty-state p {
      max-width: 400px;
      line-height: 1.6;
    }

    /* Error toast */
    .error-toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background-color: var(--accent-error);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      box-shadow: var(--shadow);
      z-index: 1000;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translate(-50%, 20px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }

    /* Mobile sidebar toggle */
    .sidebar-toggle {
      display: none;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 100;
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar-toggle {
        display: block;
      }

      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 99;
      }

      .sidebar-overlay.open {
        display: block;
      }

      .message {
        max-width: 95%;
      }
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-tertiary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-dimmed);
    }

    /* Code blocks in messages */
    .message-content code {
      background-color: var(--bg-tertiary);
      padding: 0.125rem 0.375rem;
      border-radius: 4px;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      font-size: 0.875em;
    }

    .message-content pre {
      background-color: var(--bg-tertiary);
      padding: 0.75rem;
      border-radius: 6px;
      overflow-x: auto;
      margin: 0.5rem 0;
    }

    .message-content pre code {
      background: none;
      padding: 0;
    }
  </style>
</head>
<body>
  <header>
    <div style="display: flex; align-items: center; gap: 1rem;">
      <button class="sidebar-toggle" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12h18M3 6h18M3 18h18"/>
        </svg>
      </button>
      <div class="logo">SBy <span>Strauberry Tavern</span></div>
    </div>
    <div class="header-actions">
      <button onclick="createNewConversation()" class="primary">+ New Chat</button>
    </div>
  </header>

  <div class="main-container">
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar">
      <div class="sidebar-header">
        <h3>Conversations</h3>
      </div>
      <div class="conversation-list" id="conversation-list">
        <!-- Conversations loaded dynamically -->
      </div>
    </aside>

    <main class="chat-container">
      <div class="messages" id="messages">
        <div class="empty-state" id="empty-state">
          <h2>Welcome to SBy</h2>
          <p>Start a new conversation or select an existing one from the sidebar to begin chatting.</p>
        </div>
      </div>

      <div class="input-area">
        <div class="input-container">
          <textarea
            id="message-input"
            placeholder="Type your message..."
            rows="1"
            onkeydown="handleKeyDown(event)"
            oninput="autoResize(this)"
          ></textarea>
          <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    // State
    let currentConversationId = null;
    let isStreaming = false;
    let pendingToolCalls = new Map(); // Track tool calls waiting for results
    let currentAbortController = null; // For cancelling in-flight requests

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadConversations();
    });

    // Sidebar toggle for mobile
    function toggleSidebar() {
      document.querySelector('.sidebar').classList.toggle('open');
      document.querySelector('.sidebar-overlay').classList.toggle('open');
    }

    // Auto-resize textarea
    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
    }

    // Handle Enter key
    function handleKeyDown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    // Load conversations
    async function loadConversations() {
      try {
        const response = await fetch('/api/conversations');
        const conversations = await response.json();
        renderConversationList(conversations);
      } catch (error) {
        console.error('Failed to load conversations:', error);
        showError('Failed to load conversations');
      }
    }

    // Render conversation list
    function renderConversationList(conversations) {
      const list = document.getElementById('conversation-list');

      if (conversations.length === 0) {
        list.innerHTML = '<div class="status-message">No conversations yet</div>';
        return;
      }

      list.innerHTML = conversations.map(conv => `
        <div class="conversation-item ${conv.id === currentConversationId ? 'active' : ''}"
             data-conversation-id="${conv.id}"
             onclick="selectConversation('${conv.id}')">
          <span class="conversation-title">${escapeHtml(conv.title || 'Untitled')}</span>
          <span class="conversation-date">${formatDate(conv.createdAt)}</span>
        </div>
      `).join('');
    }

    // Create new conversation
    async function createNewConversation() {
      try {
        const response = await fetch('/api/conversations', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({})
        });
        const conversation = await response.json();
        currentConversationId = conversation.id;
        await loadConversations();
        clearMessages();
        const emptyState = document.getElementById('empty-state');
        if (emptyState) emptyState.style.display = 'none';
        document.getElementById('message-input').focus();
      } catch (error) {
        console.error('Failed to create conversation:', error);
        showError('Failed to create conversation');
      }
    }

    // Select conversation
    async function selectConversation(id) {
      // Abort any in-progress stream when switching conversations
      if (currentAbortController) {
        currentAbortController.abort();
        currentAbortController = null;
      }

      // Reset streaming state
      isStreaming = false;
      pendingToolCalls.clear();

      currentConversationId = id;

      // Update active state in list using data attributes
      document.querySelectorAll('.conversation-item').forEach(item => {
        item.classList.toggle('active', item.dataset.conversationId === id);
      });

      // Re-enable input in case it was disabled
      const input = document.getElementById('message-input');
      const sendBtn = document.getElementById('send-btn');
      input.disabled = false;
      sendBtn.disabled = false;

      // Close sidebar on mobile
      if (window.innerWidth <= 768) {
        toggleSidebar();
      }

      // Load messages
      await loadMessages(id);
    }

    // Load messages for a conversation
    async function loadMessages(conversationId) {
      try {
        const response = await fetch(`/api/conversations/${conversationId}/messages`);
        const messages = await response.json();
        renderMessages(messages);
      } catch (error) {
        console.error('Failed to load messages:', error);
        showError('Failed to load messages');
      }
    }

    // Render loaded messages
    function renderMessages(messages) {
      const container = document.getElementById('messages');
      container.innerHTML = '';
      document.getElementById('empty-state')?.remove();

      messages.forEach(msg => {
        if (msg.role === 'user') {
          appendUserMessage(msg.content, false);
        } else if (msg.role === 'assistant') {
          // Render assistant message with any tool calls
          const messageEl = createAssistantMessage();

          if (msg.thinking) {
            const thinkingSection = createThinkingSection();
            thinkingSection.querySelector('.thinking-content').textContent = msg.thinking;
            messageEl.querySelector('.message-content').appendChild(thinkingSection);
          }

          if (msg.content) {
            const contentEl = document.createElement('div');
            contentEl.className = 'assistant-text';
            contentEl.textContent = msg.content;
            messageEl.querySelector('.message-content').appendChild(contentEl);
          }

          // Handle tool calls if present
          if (msg.toolCalls) {
            msg.toolCalls.forEach(tc => {
              const toolCard = createToolCard(tc.function.name, tc.function.arguments);
              if (tc.result) {
                addToolResult(toolCard, tc.result.content, tc.result.isError);
              }
              messageEl.querySelector('.message-content').appendChild(toolCard);
            });
          }

          container.appendChild(messageEl);
        }
      });

      scrollToBottom();
    }

    // Clear messages
    function clearMessages() {
      const container = document.getElementById('messages');
      container.innerHTML = '';
    }

    // Send message
    async function sendMessage() {
      const input = document.getElementById('message-input');
      const sendBtn = document.getElementById('send-btn');
      const message = input.value.trim();

      if (!message || isStreaming) return;

      // Create conversation if needed
      if (!currentConversationId) {
        await createNewConversation();
      }

      // Clear input and disable
      input.value = '';
      input.style.height = 'auto';
      input.disabled = true;
      sendBtn.disabled = true;
      isStreaming = true;

      // Remove empty state
      document.getElementById('empty-state')?.remove();

      // Add user message
      appendUserMessage(message);

      // Create assistant message container
      const assistantMessage = createAssistantMessage();
      document.getElementById('messages').appendChild(assistantMessage);

      let currentThinking = null;
      let currentContent = null;

      // Create abort controller for this request
      currentAbortController = new AbortController();

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            conversationId: currentConversationId,
            message: message
          }),
          signal: currentAbortController.signal
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });

          // Parse SSE events from buffer
          const lines = buffer.split('\n');
          buffer = lines.pop() || ''; // Keep incomplete line in buffer

          let currentEventType = 'content'; // Track event type between lines
          for (const line of lines) {
            if (line.startsWith('event: ')) {
              currentEventType = line.slice(7).trim();
              continue;
            }

            if (line.startsWith('data: ')) {
              const data = line.slice(6);

              handleSSEEvent(currentEventType, data, assistantMessage, {
                getThinking: () => currentThinking,
                setThinking: (el) => currentThinking = el,
                getContent: () => currentContent,
                setContent: (el) => currentContent = el
              });

              // Reset to default after processing data
              currentEventType = 'content';
            }
          }
        }

        // Reload conversations to update titles
        await loadConversations();

      } catch (error) {
        // Don't show error for user-initiated aborts (conversation switching)
        if (error.name === 'AbortError') {
          console.log('Request aborted');
          return;
        }

        console.error('Stream error:', error);
        showError('Failed to send message: ' + error.message);

        // Show error in assistant message
        const errorEl = document.createElement('div');
        errorEl.style.color = 'var(--accent-error)';
        errorEl.textContent = 'Error: ' + error.message;
        assistantMessage.querySelector('.message-content').appendChild(errorEl);
      } finally {
        // Remove streaming indicator
        const indicator = assistantMessage.querySelector('.streaming-indicator');
        if (indicator) {
          indicator.remove();
        }

        // Clear any orphaned pending tool calls
        pendingToolCalls.clear();

        // Clear abort controller
        currentAbortController = null;

        input.disabled = false;
        sendBtn.disabled = false;
        isStreaming = false;
        input.focus();
      }
    }

    // Handle SSE event
    function handleSSEEvent(eventType, data, messageEl, state) {
      const contentContainer = messageEl.querySelector('.message-content');

      switch (eventType) {
        case 'thinking':
          if (!state.getThinking()) {
            const thinkingSection = createThinkingSection();
            contentContainer.insertBefore(thinkingSection, contentContainer.firstChild);
            state.setThinking(thinkingSection.querySelector('.thinking-content'));
          }
          state.getThinking().textContent += data;
          break;

        case 'content':
          if (!state.getContent()) {
            const contentEl = document.createElement('div');
            contentEl.className = 'assistant-text';
            contentContainer.appendChild(contentEl);
            state.setContent(contentEl);
          }
          state.getContent().textContent += data;
          break;

        case 'tool_call':
          try {
            const toolCall = JSON.parse(data);
            const toolCard = createToolCard(
              toolCall.function?.name || toolCall.name || 'unknown',
              toolCall.function?.arguments || toolCall.arguments || '{}'
            );
            toolCard.dataset.toolCallId = toolCall.id;
            pendingToolCalls.set(toolCall.id, toolCard);
            contentContainer.appendChild(toolCard);
            // Reset content for post-tool text
            state.setContent(null);
          } catch (e) {
            console.error('Failed to parse tool call:', e);
          }
          break;

        case 'tool_result':
          try {
            const result = JSON.parse(data);
            const toolCard = pendingToolCalls.get(result.toolCallId);
            if (toolCard) {
              addToolResult(toolCard, result.content, result.isError);
              pendingToolCalls.delete(result.toolCallId);
            }
          } catch (e) {
            console.error('Failed to parse tool result:', e);
          }
          break;

        case 'status':
          const statusEl = document.createElement('div');
          statusEl.className = 'status-message';
          statusEl.textContent = data;
          contentContainer.appendChild(statusEl);
          break;

        case 'done':
          // Stream complete
          break;
      }

      scrollToBottom();
    }

    // Create user message element
    function appendUserMessage(content, animate = true) {
      const container = document.getElementById('messages');
      const messageEl = document.createElement('div');
      messageEl.className = 'message user';
      if (!animate) messageEl.style.animation = 'none';

      messageEl.innerHTML = `
        <div class="message-header">You</div>
        <div class="message-content">${escapeHtml(content)}</div>
      `;

      container.appendChild(messageEl);
      scrollToBottom();
    }

    // Create assistant message element
    function createAssistantMessage() {
      const messageEl = document.createElement('div');
      messageEl.className = 'message assistant';
      messageEl.innerHTML = `
        <div class="message-header">
          Assistant
          <div class="streaming-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
        <div class="message-content"></div>
      `;
      return messageEl;
    }

    // Create thinking section
    function createThinkingSection() {
      const section = document.createElement('div');
      section.className = 'thinking-section';
      section.innerHTML = `
        <div class="thinking-header" onclick="this.parentElement.classList.toggle('collapsed')">
          <span class="thinking-toggle">&#9660;</span>
          <span>Thinking...</span>
        </div>
        <div class="thinking-content"></div>
      `;
      return section;
    }

    // Create tool card
    function createToolCard(name, args) {
      const card = document.createElement('div');
      card.className = 'tool-card';

      let formattedArgs = args;
      try {
        if (typeof args === 'string') {
          formattedArgs = JSON.stringify(JSON.parse(args), null, 2);
        } else {
          formattedArgs = JSON.stringify(args, null, 2);
        }
      } catch (e) {
        // Keep as-is if not valid JSON
      }

      card.innerHTML = `
        <div class="tool-header">
          <span class="tool-icon">&#9881;</span>
          <span class="tool-name">${escapeHtml(name)}</span>
        </div>
        <div class="tool-args">${escapeHtml(formattedArgs)}</div>
      `;
      return card;
    }

    // Add tool result to card
    function addToolResult(card, content, isError = false) {
      const resultEl = document.createElement('div');
      resultEl.className = 'tool-result' + (isError ? ' error' : '');

      let displayContent = content;
      try {
        if (typeof content === 'string' && content.startsWith('{')) {
          displayContent = JSON.stringify(JSON.parse(content), null, 2);
        }
      } catch (e) {
        // Keep as-is
      }

      resultEl.innerHTML = `
        <div class="tool-result-label">${isError ? 'Error' : 'Output'}:</div>
        ${escapeHtml(displayContent)}
      `;
      card.appendChild(resultEl);
    }

    // Show error toast
    function showError(message) {
      const toast = document.createElement('div');
      toast.className = 'error-toast';
      toast.textContent = message;
      document.body.appendChild(toast);

      setTimeout(() => {
        toast.remove();
      }, 5000);
    }

    // Scroll to bottom of messages
    function scrollToBottom() {
      const messages = document.getElementById('messages');
      messages.scrollTop = messages.scrollHeight;
    }

    // Escape HTML
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Format date
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      const now = new Date();
      const diff = now - date;

      if (diff < 86400000) { // Less than a day
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      } else if (diff < 604800000) { // Less than a week
        return date.toLocaleDateString([], { weekday: 'short' });
      } else {
        return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
      }
    }
  </script>
</body>
</html>
