name: Build & Push Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (default: latest)"
        required: false
        default: "latest"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zarilewis/psycheros

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Psycheros
        uses: actions/checkout@v4
        with:
          path: Psycheros

      - name: Clone entity-core
        run: |
          git clone https://x-access-token:${{ secrets.ENTITY_CORE_PAT }}@github.com/zarilewis/entity-core.git entity-core

      - name: Prepare build context
        run: |
          # Dockerfile expects Psycheros/ and entity-core/ as siblings
          # with Dockerfile and entrypoint.sh at the root.
          cp Psycheros/Dockerfile ./Dockerfile
          cp Psycheros/entrypoint.sh ./entrypoint.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.event.inputs.tag }}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
